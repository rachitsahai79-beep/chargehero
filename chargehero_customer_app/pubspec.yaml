name: chargehero_customer_app
description: "ChargeHero Customer App - EV Charging Support Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Networking & API
  http: ^1.1.0
  dio: ^5.3.0

  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Date/Time
  intl: ^0.19.0

  # UI/UX
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^9.0.2

  # Image Handling
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0

  # Forms & Validation
  email_validator: ^2.1.0

  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
